services:
  frontend:
    command:
      - npx
      - ng
      - run
      - yoga:serve-coverage
      - --host=0.0.0.0
      - --port=4200
      - --proxy-config=proxy.docker.conf.json
      - --allowed-hosts=all

  cypress:
    image: cypress/included:15.2.0
    container_name: yoga_cypress
    depends_on:
      - frontend
    working_dir: /e2e
    environment:
      CYPRESS_baseUrl: http://frontend:4200
    entrypoint: ["sh", "-c"]
    command:
      - >
        [ -d node_modules/@cypress/code-coverage ] || npm ci --no-audit --no-fund &&
        echo "Waiting for frontend on http://frontend:4200..." &&
        until node -e "require('http').get('http://frontend:4200',r=>process.exit(0)).on('error',()=>process.exit(1))" 2>/dev/null; do sleep 2; done &&
        cypress run --browser electron --config-file cypress.config.ts &&
        npx nyc report --reporter=lcov --reporter=text-summary
    volumes:
      - ./front:/e2e
      - cypress_node_modules:/e2e/node_modules
    profiles:
      - e2e

volumes:
  cypress_node_modules:
